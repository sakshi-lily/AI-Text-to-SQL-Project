<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Summership 2026</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <div class="card">
      <div class="card-header">
        <h1>Sign In</h1>
        <p>Please enter your credentials below</p>
      </div>

      <!-- Authentication Error Alert -->
      <div id="authAlert" class="alert-box">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        <span id="authAlertText">Incorrect username or password.</span>
      </div>

      <form id="loginForm" novalidate>
        <!-- Username Field -->
        <div class="form-group">
          <label for="usernameInput" class="form-label">Username</label>
          <div class="input-wrapper">
            <input 
              type="text" 
              id="usernameInput" 
              class="form-input" 
              placeholder="e.g. user@domain.com"
              autocomplete="username" 
              required
            >
          </div>
          <div id="usernameError" class="error-message">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="8" x2="12" y2="12"></line>
              <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            Username is required
          </div>
        </div>

        <!-- Password Field -->
        <div class="form-group">
          <label for="passwordInput" class="form-label">Password</label>
          <div class="input-wrapper">
            <input 
              type="password" 
              id="passwordInput" 
              class="form-input" 
              placeholder="••••••••"
              autocomplete="current-password" 
              required
            >
            <button type="button" id="passwordToggleBtn" class="password-toggle" aria-label="Toggle password visibility">
              <!-- Eye open icon -->
              <svg id="eyeIconOpen" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <!-- Eye closed icon -->
              <svg id="eyeIconClosed" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" style="display: none;">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </button>
          </div>
          <div id="passwordError" class="error-message">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="8" x2="12" y2="12"></line>
              <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            Password is required
          </div>
        </div>

        <!-- Submit Button -->
        <button type="submit" id="submitBtn" class="btn-primary">
          <span id="btnText">Sign In</span>
          <div id="btnSpinner" class="spinner"></div>
        </button>
      </form>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
